      - name: Set up ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.1
          tools_version: latest
          install_tools: true

      - name: Build web editor
        working-directory: panel_web
        run: |
          npm ci
          npm run build
          npm run embed

      - name: Build 16MB firmware
        run: |
          idf.py -B build_16mb -DPILAB_FLASH_SIZE=16MB build

      - name: Upload 16MB firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pilab-panel-16mb-firmware
          path: |
            build_16mb/*.bin
            build_16mb/*.elf
            build_16mb/flash_args
            build_16mb/flash_project_args
          retention-days: 30

      - name: Upload 16MB build info
        uses: actions/upload-artifact@v4
        with:
          name: pilab-panel-16mb-build-info
          path: |
            build_16mb/config/sdkconfig
            build_16mb/project_description.json
          retention-days: 30