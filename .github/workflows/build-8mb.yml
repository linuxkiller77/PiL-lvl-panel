name: Build 8MB Flash Variant

on:
  push:
    branches: [main]
    paths:
      - '**.c'
      - '**.cpp'
      - '**.h'
      - '**.hpp'
      - 'CMakeLists.txt'
      - 'sdkconfig.defaults.8mb'
      - 'partitions_8mb.csv'
      - '.github/workflows/build-8mb.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    name: ESP-IDF Build (8MB)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build web editor
        working-directory: panel_web
        run: |
          rm -f package-lock.json
          npm install
          npm run build
          npm run embed

      - name: Build with ESP-IDF Docker (v6.0.1)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0.1
          target: esp32s3
          command: |
            cp sdkconfig.defaults.8mb sdkconfig.defaults
            rm -f sdkconfig
            idf.py fullclean
            idf.py -DPILAB_FLASH_SIZE=8MB build

      - name: Install esptool
        run: pip install esptool

      - name: Upload 8MB firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pilab-panel-8mb-firmware
          path: |
            build/*.bin
            build/*.elf
            build/flash_args
            build/flash_project_args
          retention-days: 30

      - name: Upload 8MB build info
        uses: actions/upload-artifact@v4
        with:
          name: pilab-panel-8mb-build-info
          path: |
            build/config/sdkconfig
            build/project_description.json
          retention-days: 30

      - name: Create release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/*.bin
            build/flash_args
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}