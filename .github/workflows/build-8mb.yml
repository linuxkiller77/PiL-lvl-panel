name: Build 8MB Flash Variant

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-8mb:
    name: Build 8MB Firmware
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.1
          tools_version: latest
          install_tools: true

      - name: Build web editor
        working-directory: panel_web
        run: |
          npm ci
          npm run build
          npm run embed

      - name: Build 8MB firmware
        run: |
          idf.py -B build_8mb -DPILAB_FLASH_SIZE=8MB build

      - name: Upload 8MB firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pilab-panel-8mb-firmware
          path: |
            build_8mb/*.bin
            build_8mb/*.elf
            build_8mb/flash_args
            build_8mb/flash_project_args
          retention-days: 30

      - name: Upload 8MB build info
        uses: actions/upload-artifact@v4
        with:
          name: pilab-panel-8mb-build-info
          path: |
            build_8mb/config/sdkconfig
            build_8mb/project_description.json
          retention-days: 30

  build-16mb:
    name: Build 16MB Firmware
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
